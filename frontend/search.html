<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HopStop | Search</title>
  <link rel="stylesheet" href="/style1.css">
</head>
<body>

<div class="container">
  <h2>Find Your Bus Route</h2>

  <input list="busNumbers" id="bus" placeholder="Enter Bus Number">
  <datalist id="busNumbers"></datalist>

  <p>— OR —</p>

  <input list="stops" id="start" placeholder="Start Location">
  <input list="stops" id="destination" placeholder="Destination">
  <datalist id="stops"></datalist>

  <button id="nextBtn" disabled>Next</button>
</div>

<script src="/search.js" defer></script>
</body>
</html>
