<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HopStop</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home">

<div class="hero-center">

  <!-- LOGO CARD -->
  <div class="container card" id="logoCard" tabindex="0" aria-label="Continue to search">
    <img src="/logo1.png" class="hero-logo" alt="HopStop Logo">
    <h1>HopStop</h1>
    <p class="tagline">A QR-based bus route information portal</p>
    <p class="tap" id="tapText">Tap to continue</p>
  </div>

  <!-- SEARCH CARD -->
  <div class="container card" id="searchCard" style="display:none;">
    <h1>HopStop</h1>
    <h2>🚌 Find Your Bus Route</h2>
    <p>Scan a QR code and instantly find your bus route.</p>
    <button id="nextButton">Find My Route</button>
  </div>

</div>

<script src="/main.js" defer>
</script>

</body>
</html>
